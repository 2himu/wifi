<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>রাউটার ড্যাশবোর্ড</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, -apple-system, sans-serif; background: #f5f5f0; color: #1a1a1a; min-height: 100vh; padding: 2rem; }
  .dash { max-width: 960px; margin: 0 auto; }
  .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; }
  .header h2 { font-size: 22px; font-weight: 500; }
  .header button { font-size: 13px; padding: 8px 16px; border-radius: 8px; border: 0.5px solid #ccc; background: white; color: #555; cursor: pointer; }
  .header button:hover { background: #f0f0f0; }
  .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 1.5rem; }
  .stat { background: white; border-radius: 8px; padding: 14px 16px; border: 0.5px solid #e0e0e0; }
  .stat-label { font-size: 12px; color: #888; margin-bottom: 6px; }
  .stat-val { font-size: 22px; font-weight: 500; }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 12px; }
  .card { background: white; border: 0.5px solid #e0e0e0; border-radius: 12px; padding: 1rem 1.25rem; }
  .card.online { border-left: 3px solid #1D9E75; }
  .card.offline { border-left: 3px solid #E24B4A; }
  .card.checking { border-left: 3px solid #EF9F27; }
  .card-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .brand-icon { width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 500; }
  .badge { font-size: 11px; padding: 3px 10px; border-radius: 20px; font-weight: 500; }
  .badge.online { background: #EAF3DE; color: #3B6D11; }
  .badge.offline { background: #FCEBEB; color: #A32D2D; }
  .badge.checking { background: #FAEEDA; color: #854F0B; }
  .router-name { font-size: 15px; font-weight: 500; margin-bottom: 3px; }
  .router-brand { font-size: 12px; color: #888; }
  .info-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-top: 0.5px solid #eee; }
  .info-key { font-size: 12px; color: #888; }
  .info-val { font-size: 12px; font-weight: 500; }
  .card-actions { margin-top: 12px; }
  .btn-link { display: block; text-align: center; padding: 7px; border-radius: 8px; border: 0.5px solid #ccc; font-size: 12px; color: #555; cursor: pointer; background: transparent; text-decoration: none; }
  .btn-link:hover { background: #f5f5f5; }
  .ping-val { font-size: 11px; }
  .ping-val.good { color: #1D9E75; }
  .ping-val.bad { color: #E24B4A; }
  .ping-val.mid { color: #EF9F27; }
  .note { font-size: 12px; color: #666; background: #fffbf0; border-radius: 8px; padding: 10px 14px; margin-bottom: 1.5rem; border-left: 3px solid #EF9F27; }
  .last-updated { font-size: 11px; color: #aaa; text-align: right; margin-top: 1rem; }
</style>
</head>
<body>
<div class="dash">
  <div class="header">
    <h2>রাউটার ড্যাশবোর্ড</h2>
    <button onclick="checkAll()">&#x21BB; সব চেক করুন</button>
  </div>

  <div class="note">
    প্রতি ৩০ সেকেন্ডে অটো-রিফ্রেশ হয়। অ্যাডমিন প্যানেল বাটনে ক্লিক করলে auto-login চেষ্টা করবে।
  </div>

  <div class="stats">
    <div class="stat"><div class="stat-label">মোট রাউটার</div><div class="stat-val" id="total">7</div></div>
    <div class="stat"><div class="stat-label">অনলাইন</div><div class="stat-val" id="online-count" style="color:#1D9E75">—</div></div>
    <div class="stat"><div class="stat-label">অফলাইন</div><div class="stat-val" id="offline-count" style="color:#E24B4A">—</div></div>
  </div>

  <div class="grid" id="router-grid"></div>
  <div class="last-updated" id="last-updated"></div>
</div>

<script>
const routers = [
  { id: 1, name: "ONU / Modem",   brand: "ISP",     ip: "192.168.100.1",                        user: "root", pass: "admin",    type: "basic", role: "ISP Gateway",    color: "#E6F1FB", text: "#0C447C" },
  { id: 2, name: "Main Router",   brand: "ASUS",    ip: "192.168.1.1",                           user: "Himel", pass: "ish4243@Himel",   type: "basic", role: "Primary Router", color: "#E1F5EE", text: "#085041" },
  { id: 3, name: "Sub Main (TL)", brand: "TP-Link", ip: "192.168.0.1",                           user: "admin", pass: "admin", type: "basic", role: "Sub Router",     color: "#EEEDFE", text: "#3C3489" },
  { id: 4, name: "TP-Link (AB)",  brand: "TP-Link", ip: "192.168.0.101:8080",                         user: "Himel", pass: "ish4243Himel", type: "basic", role: "Access Point",   color: "#EEEDFE", text: "#3C3489" },
  { id: 5, name: "Tenda (B3)",    brand: "Tenda",   ip: "192.168.0.102:8080",                         user: "",      pass: "ish4243Himel", type: "tenda", role: "Access Point",   color: "#FAEEDA", text: "#633806" },
  { id: 6, name: "Tenda (S)",     brand: "Tenda",   ip: "192.168.0.103:8080",                         user: "",      pass: "ish4243Himel", type: "tenda", role: "Access Point",   color: "#FAEEDA", text: "#633806" },
  { id: 7, name: "Ruijie (CD)",   brand: "Ruijie",  ip: "cloud-as.ruijienetworks.com/sso/login", user: "ishtiaqhossain50@gmail.com",      pass: "ish4243Himel",                 type: "cloud", role: "Access Point",   color: "#FAECE7", text: "#712B13" },
];

const state = {};
routers.forEach(r => state[r.id] = { status: "checking", ping: null });

function openPanel(r) {
  if (r.type === "basic" && r.user && r.pass) {
    // Basic auth — credentials embedded in URL
    window.open(`http://${r.user}:${r.pass}@${r.ip}`, "_blank");
  } else if (r.type === "tenda") {
    // Tenda — only password needed, try to autofill after page loads
    const w = window.open(`http://${r.ip}`, "_blank");
    const pass = r.pass;
    let attempts = 0;
    const interval = setInterval(() => {
      attempts++;
      try {
        const doc = w.document;
        const pwdInputs = doc.querySelectorAll('input[type="password"], input[name*="pass"], input[id*="pass"]');
        if (pwdInputs.length > 0) {
          pwdInputs[0].value = pass;
          pwdInputs[0].dispatchEvent(new Event('input', { bubbles: true }));
          pwdInputs[0].dispatchEvent(new Event('change', { bubbles: true }));
          const submitBtn = doc.querySelector('button[type="submit"], input[type="submit"], .login-btn, #login-btn, .btn-login');
          if (submitBtn) submitBtn.click();
          clearInterval(interval);
        }
      } catch(e) {
        // Cross-origin block — ব্রাউজারের saved password কাজ করবে
      }
      if (attempts > 20) clearInterval(interval);
    }, 500);
  } else if (r.type === "cloud") {
    window.open(`https://${r.ip}`, "_blank");
  } else {
    window.open(`http://${r.ip}`, "_blank");
  }
}

function renderCards() {
  const grid = document.getElementById("router-grid");
  grid.innerHTML = routers.map(r => {
    const s = state[r.id];
    const initials = r.brand.slice(0, 2).toUpperCase();
    const pingHtml = s.ping !== null
      ? `<span class="ping-val ${s.ping < 50 ? 'good' : s.ping < 150 ? 'mid' : 'bad'}">${s.ping}ms</span>`
      : `<span class="ping-val mid">—</span>`;
    return `
    <div class="card ${s.status}">
      <div class="card-top">
        <div style="display:flex;align-items:center;gap:10px;">
          <div class="brand-icon" style="background:${r.color};color:${r.text}">${initials}</div>
          <div>
            <div class="router-name">${r.name}</div>
            <div class="router-brand">${r.brand} &mdash; ${r.ip}</div>
          </div>
        </div>
        <span class="badge ${s.status}">${s.status === 'online' ? 'অনলাইন' : s.status === 'offline' ? 'অফলাইন' : 'চেক হচ্ছে...'}</span>
      </div>
      <div class="info-row"><span class="info-key">ভূমিকা</span><span class="info-val">${r.role}</span></div>
      <div class="info-row"><span class="info-key">পিং</span>${pingHtml}</div>
      <div class="card-actions">
        <a class="btn-link" onclick="openPanel(routers[${r.id - 1}]); return false;" href="#">অ্যাডমিন প্যানেল খুলুন &#8599;</a>
      </div>
    </div>`;
  }).join("");
  updateStats();
}

function updateStats() {
  const online = Object.values(state).filter(s => s.status === "online").length;
  const offline = Object.values(state).filter(s => s.status === "offline").length;
  document.getElementById("online-count").textContent = online;
  document.getElementById("offline-count").textContent = offline;
  const now = new Date();
  document.getElementById("last-updated").textContent = "সর্বশেষ আপডেট: " + now.toLocaleTimeString('bn-BD');
}

async function checkRouter(router) {
  state[router.id].status = "checking";
  renderCards();
  const start = Date.now();
  try {
    const ctrl = new AbortController();
    const timeout = setTimeout(() => ctrl.abort(), 3000);
    const checkUrl = router.type === "cloud" ? `https://${router.ip}` : `http://${router.ip}`;
    await fetch(checkUrl, { mode: "no-cors", signal: ctrl.signal, cache: "no-store" });
    clearTimeout(timeout);
    const ping = Date.now() - start;
    state[router.id] = { status: "online", ping };
  } catch (e) {
    if (e.name === "AbortError") {
      state[router.id] = { status: "offline", ping: null };
    } else {
      state[router.id] = { status: "online", ping: Date.now() - start };
    }
  }
  renderCards();
}

function checkAll() {
  routers.forEach(r => checkRouter(r));
}

renderCards();
checkAll();
setInterval(checkAll, 30000);
</script>
</body>
</html>
